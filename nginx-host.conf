server {
    listen 80;
    server_name subdomain.yourdomain.com; # REPLACE WITH YOUR SUBDOMAIN

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name subdomain.yourdomain.com; # REPLACE WITH YOUR SUBDOMAIN

    # SSL certificates managed by Certbot on Host VPS
    ssl_certificate /etc/letsencrypt/live/subdomain.yourdomain.com/fullchain.pem;     # REPLACE subdomain.yourdomain.com
    ssl_certificate_key /etc/letsencrypt/live/subdomain.yourdomain.com/privkey.pem;   # REPLACE subdomain.yourdomain.com

    # Modern SSL configurations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Proxy root requests to the frontend Docker container (running on port 8080)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API requests to the backend Docker container (running on port 8001)
    location /api/ {
        proxy_pass http://127.0.0.1:8001/; # Note the trailing slash to strip '/api/' prefix
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering to allow streaming responses
        proxy_buffering off;
        proxy_read_timeout 600s;
    }
}
