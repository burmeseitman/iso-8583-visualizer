server {
    listen 80;
    server_name yourdomain.com; # REPLACE WITH YOUR DOMAIN

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name yourdomain.com; # REPLACE WITH YOUR DOMAIN

    # SSL certificates (Let's Encrypt paths)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;     # REPLACE yourdomain.com WITH YOUR DOMAIN
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;   # REPLACE yourdomain.com WITH YOUR DOMAIN

    # SSL configurations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Serve the built React static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service container
    location /api/ {
        proxy_pass http://backend:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering to allow streaming responses
        proxy_buffering off;
        proxy_read_timeout 600s;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
